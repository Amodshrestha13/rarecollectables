<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rare Collectables</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

/* Navigation bar */
nav{
    background:#222;
    padding:15px;
}

nav ul{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
}

nav ul li{
    margin:0 20px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:18px;
}

nav ul li a:hover{
    color:#ffd700;
}

/* Login section */
.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.login-box{
    background:white;
    padding:40px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.login-box h2{
    text-align:center;
}

.login-box label{
    font-weight:bold;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:8px 0 20px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-box button{
    width:100%;
    padding:10px;
    background:#222;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.login-box button:hover{
    background:#ffd700;
    color:black;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<!-- Navigation -->
<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="collection.html">Collections</a></li>
<li><a href="profile.html">Profile</a></li>

</ul>
</nav>

<!-- Login Form -->
<div class="login-container">
<div class="login-box">

<h2>Login</h2>

<form>
<label>Account Name</label>
<input type="text" placeholder="Enter your account name" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<button type="submit">Log In</button>
</form>

</div>
</div>

<footer>
<p> Rare Collectables</p>
</footer>

</body>
</html>
