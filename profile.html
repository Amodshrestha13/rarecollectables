<style>

nav{

nav ul{
    list-style:none;

}

nav ul li a{

}

}

/* Profile container */

.profile-container{
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.profile-container img{
    width:120px;
    height:120px;
    border-radius:50%;

.profile-container h2{

}

.info p{
    font-size:16px;

.btn{
    margin-top:20px;
    padding:10px;
    width:100%;
    border:none;
    background:#222;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.btn:hover{
    background:#ffd700;
    color:black;
}

    background:#222;
    color:white;
    text-align:center;
    padding:15px;
